services:
  sommelier-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-sommelier-assistant:latest
    container_name: ai-sommelier-assistant
    ports:
      - "8012:8012"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      SOMMELIER_DB_PATH: "/app/runtime/sommelier.sqlite3"
      SOMMELIER_LLM_KEEPALIVE_SECONDS: "${SOMMELIER_LLM_KEEPALIVE_SECONDS:-600}"
    volumes:
      - ./data:/app/data
      - sommelier-runtime:/app/runtime
    restart: unless-stopped

volumes:
  sommelier-runtime:
